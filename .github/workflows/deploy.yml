name: 🚀 Multi-Stage Deploy (Staging & Production)

on:
  push:
    branches:
      - main
      - staging

concurrency:
  group: ${{ github.ref }}
  cancel-in-progress: true

# ===============================================================
# JOB 1: BUILD (NO VENDOR, NO COMPOSER)
# ===============================================================
jobs:
  build:
    name: 📦 Build Frontend Assets
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: 🚚 Checkout
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: 📦 Install NPM
        run: npm ci

      - name: 🔨 Build Vite
        run: npm run build

      - name: 📁 Prepare Artifact (NO VENDOR)
        run: |
          mkdir deploy_package
          rsync -a \
            --exclude=vendor \
            --exclude=node_modules \
            --exclude=.git \
            --exclude=.github \
            --exclude=.env \
            . deploy_package/

      - name: 📤 Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-build
          path: deploy_package/

# ===============================================================
# JOB 2: DEPLOY STAGING
# ===============================================================
  deploy-staging:
    name: 🚧 Deploy Staging
    needs: build
    if: github.ref == 'refs/heads/staging'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: 📥 Download Artifact
        uses: actions/download-artifact@v4
        with:
          name: app-build

      # PUBLIC → public_html
      - name: 📂 FTP Public (Staging)
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.IP }}
          username: ${{ secrets.USERNAME }}
          password: ${{ secrets.PASSWORD }}
          protocol: ftp
          timeout: 3600000

          local-dir: ./public/
          server-dir: /domains/posyandukaranggan.com/public_html/

          state-name: .ftp-staging-public.json
          log-level: standard

      # APP → public_html/staging
      - name: 📂 FTP App (Staging)
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.IP }}
          username: ${{ secrets.USERNAME }}
          password: ${{ secrets.PASSWORD }}
          protocol: ftp
          timeout: 3600000

          local-dir: ./
          server-dir: /domains/posyandukaranggan.com/public_html/staging/

          exclude: |
            vendor/**
            public/**
            node_modules/**
            .git/**
            .github/**
            .env

          state-name: .ftp-staging-app.json
          log-level: standard

# ===============================================================
# JOB 3: DEPLOY PRODUCTION
# ===============================================================
  deploy-production:
    name: 🎉 Deploy Production
    needs: build
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: 📥 Download Artifact
        uses: actions/download-artifact@v4
        with:
          name: app-build

      # PUBLIC → public_html
      - name: 📂 FTP Public (Production)
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.IP }}
          username: ${{ secrets.USERNAME }}
          password: ${{ secrets.PASSWORD }}
          protocol: ftp
          timeout: 3600000

          local-dir: ./public/
          server-dir: /domains/posyandukaranggan.com/public_html/

          state-name: .ftp-prod-public.json
          log-level: standard

      # APP → folder laravel
      - name: 📂 FTP App (Production)
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.IP }}
          username: ${{ secrets.USERNAME }}
          password: ${{ secrets.PASSWORD }}
          protocol: ftp
          timeout: 3600000

          local-dir: ./
          server-dir: /domains/posyandukaranggan.com/posyandukaranggan/

          exclude: |
            vendor/**
            public/**
            node_modules/**
            .git/**
            .github/**
            .env

          state-name: .ftp-prod-app.json
          log-level: standard
